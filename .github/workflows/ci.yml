name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Type check with mypy
      run: |
        mypy src/stock_analysis/ --exclude tests --exclude backtest_5yr --ignore-missing-imports

    - name: Test with pytest
      run: |
        PYTHONPATH="src" pytest tests/test_engine.py tests/test_pipeline.py tests/test_ranker.py tests/test_validate_crypto.py -v

    - name: Verify imports
      run: |
        PYTHONPATH="src" python3 -c "from stock_analysis.cli import run_analysis; print('Import OK')"
        PYTHONPATH="src" python3 -c "from stock_analysis.data.fetcher import fetch_all_8; print('Fetcher OK')"
        PYTHONPATH="src" python3 -c "from stock_analysis.ranking.greenblatt import compute_greenblatt; print('Ranker OK')"